backend:
  name: git-gateway
  branch: main

media_folder: "assets-source/uploads"
public_folder: "/assets-source/uploads"

locale: fr

collections:

  # ── Page d'accueil ───────────────────────────────────────────
  - name: "pages"
    label: "Pages"
    files:
      - name: "home_fr"
        label: "Page d'accueil (FR)"
        file: "src/_data/home_fr.json"
        fields:
          - label: "Hero — Sous-titre"
            name: "hero_sous_titre"
            widget: "string"
          - label: "Hero — Fondateur"
            name: "hero_fondateur"
            widget: "string"
          - label: "Hero — Accroche"
            name: "hero_tagline"
            widget: "text"
          - label: "Hero — Bouton principal"
            name: "hero_cta_principal"
            widget: "string"
          - label: "Hero — Bouton secondaire"
            name: "hero_cta_secondaire"
            widget: "string"
          - label: "Services — Label"
            name: "services_label"
            widget: "string"
          - label: "Services — Titre"
            name: "services_titre"
            widget: "string"
          - label: "Services — Intro"
            name: "services_intro"
            widget: "text"
          - label: "Portfolio — Label"
            name: "portfolio_label"
            widget: "string"
          - label: "Portfolio — Titre"
            name: "portfolio_titre"
            widget: "string"
          - label: "Témoignages — Label"
            name: "temoignages_label"
            widget: "string"
          - label: "Témoignages — Titre"
            name: "temoignages_titre"
            widget: "string"
          - label: "Contact — Label"
            name: "contact_label"
            widget: "string"
          - label: "Contact — Titre"
            name: "contact_titre"
            widget: "string"
          - label: "Contact — Intro"
            name: "contact_intro"
            widget: "text"

  # ── Projets FR ──────────────────────────────────────────────
  - name: "projets_fr"
    label: "Projets (FR)"
    folder: "src/content/projets/fr"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Titre", name: "titre", widget: "string" }
      - { label: "Description courte", name: "description", widget: "text" }
      - { label: "Catégorie", name: "categorie", widget: "select",
          options: ["Consulting", "Marketing", "Média", "Digital", "Design", "IA"] }
      - { label: "Type", name: "type", widget: "select",
          options: ["interne", "externe"] }
      - { label: "URL externe (si type = externe)", name: "url_externe",
          widget: "string", required: false }
      - { label: "Image", name: "image", widget: "image", required: false }
      - { label: "Ordre d'affichage", name: "order", widget: "number",
          default: 99, required: false }
      - { label: "Contexte", name: "contexte", widget: "text", required: false }
      - { label: "Problématique", name: "problematique", widget: "text",
          required: false }
      - { label: "Solution proposée", name: "solution", widget: "text",
          required: false }
      - { label: "Résultats", name: "resultats", widget: "text",
          required: false }

  # ── Témoignages FR ──────────────────────────────────────────
  - name: "temoignages_fr"
    label: "Témoignages (FR)"
    folder: "src/content/temoignages/fr"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Texte", name: "texte", widget: "text" }
      - { label: "Nom", name: "nom", widget: "string" }
      - { label: "Poste", name: "poste", widget: "string" }
      - { label: "Entreprise", name: "entreprise", widget: "string" }
      - { label: "Ordre", name: "order", widget: "number", default: 99 }

  # ── Services FR ─────────────────────────────────────────────
  - name: "services_fr"
    label: "Services (FR)"
    folder: "src/content/services/fr"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Titre", name: "titre", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Icône (emoji)", name: "icone", widget: "string" }
      - { label: "Ordre", name: "order", widget: "number", default: 99 }
